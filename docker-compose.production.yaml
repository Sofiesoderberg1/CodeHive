services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production

    ports:
      - "3000:3000"

    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/codehive

  mongodb:
    image: mongo

    volumes:
      - mongodb-data:/data/db

volumes:
  mongodb-data: